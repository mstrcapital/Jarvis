# 素材收集定时任务配置
# Created: 2026-02-19

# 使用方法:
# 1. 编辑crontab: crontab -e
# 2. 添加以下行
# 3. 保存退出

# ==================== 定时任务 ====================

# 每天早上9点自动导入链接池并开始下载
0 9 * * * cd /root/.openclaw/workspace/video-materials && ./collect.sh import >> /var/log/materials_import.log 2>&1
5 9 * * * cd /root/.openclaw/workspace/video-materials && ./collect.sh download >> /var/log/materials_download.log 2>&1

# 每天晚上9点检查并重试失败任务
0 21 * * * cd /root/.openclaw/workspace/video-materials && ./collect.sh retry >> /var/log/materials_retry.log 2>&1

# 每周一早上10点生成周报
0 10 * * 1 cd /root/.openclaw/workspace/video-materials && python3 batch_downloader.py status >> /var/log/materials_weekly_report.log 2>&1

# ==================== 手动命令 ====================

# 查看cron任务
# crontab -l

# 编辑cron任务
# crontab -e

# 查看日志
# tail -f /var/log/materials_download.log
# tail -f /var/log/materials_import.log
# tail -f /var/log/materials_retry.log

# ==================== 任务说明 ====================

# 任务1: 9:00 导入链接
#   从 links/links_pool.txt 导入待下载任务

# 任务2: 9:05 开始下载
#   并行下载3个视频，最多10分钟超时

# 任务3: 21:00 重试失败
#   重置失败任务为待下载状态

# 任务4: 每周一10:00 周报
#   生成下载统计报告

# ==================== 启动命令 ====================

# 手动启动一次收集
# cd /root/.openclaw/workspace/video-materials
# ./collect.sh import
# ./collect.sh download

# 查看状态
# ./collect.sh status

# 添加新链接
# ./collect.sh add "https://youtube.com/xxx" luxury high
